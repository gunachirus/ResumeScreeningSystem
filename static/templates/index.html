<!DOCTYPE html>
<html>
<head>

    <title>Resume Screening System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">Resume Screening System</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data" class="card p-4 shadow">

        <label class="mb-2">Upload Resume PDF</label>

        <input type="file" name="resume" class="form-control mb-3" required>

        <button type="submit" class="btn btn-primary">Upload Resume</button>

    </form>

</div>

</body>
</html>
